<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grid</title>
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
</head>
<body>
    <div class=" grid grid-cols-3 rows-span-3 gap-4 p-4">
        <div class="bg-red-400 col-span-2 row-span-2 p-4 rounded-lg text-white text-center "> span 2x2</div>
        <div class="bg-green-600 p-4 rounded-lg text-white text-center "> image 2</div>
        <div class="bg-blue-500 p-4 rounded-lg text-white text-center "> image 3</div>
        <div class="bg-yellow-500 p-4 rounded-lg text-white text-center "> image 4</div>
        <div class="bg-yellow-500 p-4 rounded-lg text-white text-center "> image 5</div>
        <div class="bg-yellow-500 p-4 rounded-lg text-white text-center "> image 6</div>
       
    </div>


</body>
</html>
